apiVersion: apps/v1
kind: Deployment
metadata:
  name: hitl-hub
  namespace: nodus-dev
  labels:
    app: hitl-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hitl-hub
  template:
    metadata:
      labels:
        app: hitl-hub
    spec:
      containers:
        - name: hitl-hub
          image: ghcr.io/nodus-factory/nodus-hitl-hub:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: llibreta-db
                  key: url
            - name: REDIS_URL
              value: "redis://redis.nodus-dev:6379/0"
            - name: RELAY_URL
              value: "wss://nostr.mycompanion.es"
            - name: BACKOFFICE_URL
              value: "http://backoffice.nodus-dev:5001"
          envFrom:
            - configMapRef:
                name: hitl-hub-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hitl-hub
  namespace: nodus-dev
spec:
  selector:
    app: hitl-hub
  ports:
    - port: 3000
      targetPort: 3000
      name: http
