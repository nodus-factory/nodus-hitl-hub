apiVersion: apps/v1
kind: Deployment
metadata:
  name: hitl-hub
  namespace: nodus-dev
  labels:
    app: hitl-hub
    component: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hitl-hub
      component: platform
  template:
    metadata:
      labels:
        app: hitl-hub
        component: platform
    spec:
      imagePullSecrets:
        - name: ghcr-login-secret
      containers:
        - name: hitl-hub
          image: ghcr.io/nodus-factory/nodus-hitl-hub:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://nodus:nodus_password@postgres:5432/nodus_db"
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: RELAY_URL
              value: "ws://nostr-relay:7777"
            - name: BACKOFFICE_URL
              value: "http://backoffice:5001"
            - name: MEMORIUM_URL
              value: "http://memorium:8082"
            # Signs kind:10020 inbox items published by the hub
            - name: HITL_HUB_NSEC
              valueFrom:
                secretKeyRef:
                  name: nodus-secrets
                  key: hitl-hub-nsec
                  optional: true
          envFrom:
            - configMapRef:
                name: hitl-hub-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: hitl-hub
  namespace: nodus-dev
spec:
  selector:
    app: hitl-hub
  ports:
    - port: 3000
      targetPort: 3000
      name: http
